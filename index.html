<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stazeni videa</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        video {
            max-width: 100%;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .btn-download {
            display: inline-block;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
        }
        .btn-download:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Tvoje video je pripraveno ke stazeni</h2>
    
    <!-- Prehravac primo na webu -->
    <video controls width="640">
        <source src="moje-video.mp4.avi" type="video/mp4">
        Tvuj prohlizec nepodporuje prehravani videa.
    </video>
    
    <br>
    
    <!-- Tlacitko pro prime stazeni -->
    <a href="moje-video.mp4.avi" download="video_na_stazeni.mp4" class="btn-download">
        Stahnout video do PC / mobilu
    </a>
</div>

</body>
</html>
